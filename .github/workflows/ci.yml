name: Backend CI Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Node Version
        run: node -v

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test